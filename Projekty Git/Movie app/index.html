<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>MovieApp</title>
</head>
<body>
    <div class="header">
        <div class="logo">MovieApp</div>
        <div class="search-container">
            <div class="search-bar">
                <input type="text" class="search-input" placeholder="Search for movie" id="searchInput">
            </div>
            <div class="filters">
                <select id="genreFilter">
                    <option value="">All Genres</option>
                </select>
                <select id="yearFilter">
                    <option value="">Year</option>
                </select>
                <select id="sortFilter">
                    <option value="">Sort By</option>
                    <option value="popularity.desc">Most popular</option>
                    <option value="vote_average.desc">Highest Rated</option>
                    <option value="release_date.desc">Latest Release</option>
                    <option value="title.asc">A-Z</option>
                </select>
            </div>
            <button class="clear-btn" id="clearBtn">Clear All</button>
        </div>
    </div>
    
    <div class="main-content">
        <div id="trendingSection">
            <div class="section-title">
                <p>Trending Now</p>
            </div>
            <div class="carousel-container">
                <button class="carousel-btn prev" id="trendingPrev">
                 <
                </button>
                <div class="carousel" id="trendingCarousel">
                    <div class="loading">
                        Loading trending movies...
                    </div>
                    <button class="carousel-btn next" id="trendingNext">
                 >
                    </button>
                </div>
            </div>

            <div class="selection-title" id="randomSectionTitle">

            </div>
            <div class="movies-grid" id="moviesGrid">
                <div class="loading">Loading Movies...</div>
            </div>
        </div>
    </div>
    <script src="./js/MovieApp.js"></script>
    <script src="./js/MovieAPI.js"></script>
    
    <script src="./js/main.js"></script>
</body>
</html>
