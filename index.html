<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css"> 
    <title>To-Do List</title>
</head>

<body>

    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="row justify-content-center w-100">
            <div class="todo-app w-100">
                <h1>To-Do App</h1>
                <form class="input-area d-flex flex-column flex-sm-row gap-2">
                    <input type="text" id="task-input" class="form-control"  placeholder="Add a new task...">
                    <button class="btn btn-outline-light rounded-pill px-4" type="submit" id="add-task-btn">Add task</button>
                </form>
                <div id="progress-text"> 0 / 0</div>
                <div class="progress-bar-container">
                    <div id="progress-bar"></div>
                  </div>
                <div class="todos-container">
                    <ul id="task-list">
                       
                    </ul>
                </div>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/Task.js"></script>
    <script src="./js/TaskManager.js"></script>
    <script src="./js/main.js"></script>
</body>

</html>
